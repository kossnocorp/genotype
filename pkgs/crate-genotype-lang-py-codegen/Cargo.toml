[package]
name = "genotype_lang_py_codegen"
version = "0.14.0"
edition = "2024"
description = "Genotype language Python target codegen crate"
authors = ["Sasha Koss <koss@nocorp.me>"]
license = "MIT"
repository = "https://github.com/kossnocorp/genotype"

[dependencies]
genotype_lang_core_codegen = { version = "0.14.0", path = "../crate-genotype-lang-core-codegen" }
genotype_lang_core_tree = { version = "0.14.0", path = "../crate-genotype-lang-core-tree" }
genotype_lang_py_tree = { version = "0.14.0", path = "../crate-genotype-lang-py-tree" }
genotype_parser = { version = "0.14.0", path = "../crate-genotype-parser" }
miette = { version = "7.6.0", features = ["fancy", "serde"] }

[dev-dependencies]
pretty_assertions = "1.4.1"
insta = { version = "1.46.3", features = ["ron"] }
genotype_test = { version = "0.14.0", path = "../crate-genotype-test" }
