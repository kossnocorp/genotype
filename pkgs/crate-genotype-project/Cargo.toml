[package]
name = "genotype_project"
version = "0.15.0"
edition = "2024"
description = "Genotype language project crate"
authors = ["Sasha Koss <koss@nocorp.me>"]
license = "MIT"
repository = "https://github.com/kossnocorp/genotype"

[dependencies]
genotype_lang_core_config = { version = "0.15.0", path = "../crate-genotype-lang-core-config" }
genotype_project_core = { version = "0.15.0", path = "../crate-genotype-project-core", features = [
  "project",
] }
genotype_parser = { version = "0.15.0", path = "../crate-genotype-parser" }
genotype_workspace_core = { version = "0.15.0", path = "../crate-genotype-workspace-core" }
genotype_lang_py_config = { version = "0.15.0", path = "../crate-genotype-lang-py-config" }
genotype_lang_ts_config = { version = "0.15.0", path = "../crate-genotype-lang-ts-config" }
genotype_lang_rs_config = { version = "0.15.0", path = "../crate-genotype-lang-rs-config" }
glob = "0.3.1"
miette = { version = "7.6.0", features = ["serde"] }
num_cpus = "1.16.0"
rayon = "1.10.0"
thiserror = "1.0.64"
delegate = "0.13.3"
relative-path = { version = "1.9.3", features = ["serde"] }
serde = { version = "1.0.228", features = ["derive"] }
indexmap = { version = "2.6.0", features = ["serde"] }
figment = { version = "0.10.19", features = ["toml", "env"] }
semver = { version = "1.0.27", features = ["serde"] }
toml = { version = "0.8.19", features = ["preserve_order"] }
toml_ext = { version = "0.1.0", path = "../crate-toml-ext" }
toml_edit = { version = "0.22.26", features = ["serde"] }

[dev-dependencies]
pretty_assertions = "1.4.1"
insta = { version = "1.46.3", features = ["ron"] }
genotype_test = { path = "../crate-genotype-test" }
