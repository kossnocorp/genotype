[package]
name = "genotype_lang_rs_tree"
version = "0.14.0"
edition = "2024"
description = "Genotype language Rust target AST crate"
authors = ["Sasha Koss <koss@nocorp.me>"]
license = "MIT"
repository = "https://github.com/kossnocorp/genotype"

[dependencies]
genotype_config = { version = "0.14.0", path = "../crate-genotype-config" }
genotype_lang_core_tree = { version = "0.14.0", path = "../crate-genotype-lang-core-tree" }
genotype_lang_rs_config = { version = "0.14.0", path = "../crate-genotype-lang-rs-config" }
genotype_lang_rs_core = { version = "0.14.0", path = "../crate-genotype-lang-rs-core" }
genotype_parser = { version = "0.14.0", path = "../crate-genotype-parser" }
miette = { version = "7.6.0", features = ["fancy", "serde"] }
thiserror = "1.0.64"
heck = "0.5.0"
unicode-xid = "0.2.6"
serde = { version = "1.0.210", features = ["derive", "rc"] }

[dev-dependencies]
genotype_test = { version = "0.14.0", path = "../crate-genotype-test" }
pretty_assertions = "1.4.1"
insta = { version = "1.46.3", features = ["ron"] }
