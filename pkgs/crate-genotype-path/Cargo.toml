[package]
name = "genotype_path"
version = "0.14.0"
edition = "2024"
description = "Genotype language path crate"
authors = ["Sasha Koss <koss@nocorp.me>"]
license = "MIT"
repository = "https://github.com/kossnocorp/genotype"

[dependencies]
genotype_parser = { version = "0.14.0", path = "../crate-genotype-parser", optional = true }
relative-path = { version = "1.9.3", features = ["serde"] }
serde = { version = "1.0.219", features = ["derive"] }

[dev-dependencies]
pretty_assertions = "1.4.1"
insta = { version = "1.46.3", features = ["ron"] }

[features]
default = []
project = ["parser"]
parser = ["genotype_parser"]
