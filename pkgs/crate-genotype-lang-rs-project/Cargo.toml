[package]
name = "genotype_lang_rs_project"
version = "0.15.0"
edition = "2024"
description = "Genotype language Rust target project crate"
authors = ["Sasha Koss <koss@nocorp.me>"]
license = "MIT"
repository = "https://github.com/kossnocorp/genotype"

[dependencies]
genotype_project_core = { version = "0.15.0", path = "../crate-genotype-project-core" }
genotype_parser = { version = "0.15.0", path = "../crate-genotype-parser" }
genotype_project = { version = "0.15.0", path = "../crate-genotype-project" }
genotype_lang_core_config = { version = "0.15.0", path = "../crate-genotype-lang-core-config" }
genotype_lang_core_tree = { version = "0.15.0", path = "../crate-genotype-lang-core-tree" }
genotype_lang_core_project = { version = "0.15.0", path = "../crate-genotype-lang-core-project" }
genotype_lang_rs_tree = { version = "0.15.0", path = "../crate-genotype-lang-rs-tree" }
genotype_lang_rs_config = { version = "0.15.0", path = "../crate-genotype-lang-rs-config" }
miette = { version = "7.6.0", features = ["fancy", "serde"] }
thiserror = "1.0.64"
indexmap = { version = "2.6.0", features = ["serde"] }
toml_edit = { version = "0.22.26", features = ["serde"] }
serde = { version = "1.0.210", features = ["derive"] }
petgraph = "0.8.3"

[dev-dependencies]
pretty_assertions = "1.4.1"
insta = { version = "1.46.3", features = ["ron"] }
genotype_test = { path = "../crate-genotype-test" }
toml = { version = "0.8.19", features = ["preserve_order"] }
