[package]
name = "litty_macro"
version = "0.3.0"
edition = "2024"
description = "Macro crate for Litty, literals for Rust"
authors = ["Sasha Koss <koss@nocorp.me>"]
license = "MIT"
readme = "README.md"
repository = "https://github.com/kossnocorp/genotype/tree/main/pkgs/crate-litty-macro"

[lib]
proc-macro = true

[dependencies]
proc-macro2 = "1.0.89"
quote = "1.0.37"
serde = { version = "1.0.228", features = ["derive"] }
syn = { version = "2.0.87", features = ["full"] }
