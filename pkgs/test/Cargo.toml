[package]
name = "genotype_test"
version = "0.14.0"
edition = "2024"
description = "Internal Genotype language test helpers"
authors = ["Sasha Koss <koss@nocorp.me>"]
license = "MIT"
repository = "https://github.com/kossnocorp/genotype"

[dependencies]
miette = { version = "7.6.0", features = ["fancy", "serde"] }
genotype_parser = { version = "0.14.0", path = "../../parser", features = ["test"]}
genotype_visitor = { version = "0.14.0", path = "../../visitor" }
genotype_project = { version = "0.14.0", path = "../../project" }
genotype_path = { version = "0.14.0", path = "../../path" }
relative-path = { version = "1.9.3", features = ["serde"] }
pretty_assertions = "1.4.1"
insta = { version = "1.46.3", features = ["ron"] }
