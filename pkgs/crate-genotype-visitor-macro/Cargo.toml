[package]
name = "genotype_visitor_macro"
version = "0.14.0"
edition = "2024"
description = "Genotype visitor proc-macros"
authors = ["Sasha Koss <koss@nocorp.me>"]
license = "MIT"
repository = "https://github.com/kossnocorp/genotype"

[lib]
proc-macro = true

[dependencies]
heck = "0.5.0"
proc-macro2 = "1.0.95"
quote = "1.0.40"
syn = { version = "2.0.101", features = ["full"] }

[dev-dependencies]
trybuild = "1.0.111"
