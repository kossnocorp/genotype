[package]
name = "genotype_core"
version = "0.15.0"
edition = "2024"
description = "Genotype language core crate"
authors = ["Sasha Koss <koss@nocorp.me>"]
license = "MIT"
repository = "https://github.com/kossnocorp/genotype"

[dependencies]
serde = { version = "1.0.228", features = ["derive"] }
miette = { version = "7.6.0", features = ["serde"] }
litty = { version = "0.5.0", path = "../crate-litty" }

[dev-dependencies]
pretty_assertions = "1.4.1"
insta = { version = "1.46.3", features = ["ron"] }
