name: Set Up Dev Env
description: "Set up development environment by installing dependencies and restoring caches."

inputs:
  target-key:
    required: true
    description: "Key for caching target directory."

runs:
  using: "composite"

  steps:
    - name: Install mise and Tools
      uses: jdx/mise-action@v4

    - name: Restore mise State (Tasks)
      uses: actions/cache/restore@v5
      with:
        path: ~/.local/state/mise
        key: mise-state-${{ runner.os }}-${{ hashFiles('**/mise.toml') }}-${{ github.sha }}
        restore-keys: |
          mise-state-${{ runner.os }}-${{ hashFiles('**/mise.toml') }}-
          mise-state-${{ runner.os }}-

    - name: Restore rustup Cache
      uses: actions/cache/restore@v5
      with:
        path: ~/.rustup
        key: rustup-${{ runner.os }}-${{ hashFiles('**/rust-toolchain.toml') }}
        restore-keys: |
          rustup-${{ runner.os }}-

    - name: Restore Cargo Cache
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          ~/.cargo/binstall
          ~/.cargo/env
        key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          cargo-${{ runner.os }}-

    - name: Restore Target Cache
      uses: actions/cache/restore@v5
      with:
        path: target
        key: target-${{ runner.os }}-${{ inputs.target-key }}-${{ github.sha }}
        restore-keys: |
          target-${{ runner.os }}-${{ inputs.target-key }}-
          target-${{ runner.os }}-

    - name: Get pnpm Store Path
      id: pnpm-store
      run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      shell: bash

    - name: Restore pnpm Cache
      uses: actions/cache/restore@v5
      with:
        path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
        key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-${{ runner.os }}-

    - name: Restore uv Cache
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.cache/uv
          ~/.local/share/uv
          .venv
        key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          uv-${{ runner.os }}-

    # NOTE: This is workaround for mise action messing up with rustup state:
    # - https://github.com/jdx/mise-action/issues/184
    # - https://github.com/jdx/mise-action/issues/215
    - name: Install Rust Components
      run: |
          export active_rust_toolchain=$(rustup show active-toolchain | cut -d' ' -f1)
          # NOTE: Workaround for "error: failed to install component: 'rustfmt-preview-x86_64-unknown-linux-gnu', detected conflict: 'bin/cargo-fmt'"
          active_rust_bin_dir=$(dirname "$(rustup which rustc --toolchain "${active_rust_toolchain}")")

          rm -f "${active_rust_bin_dir}/cargo-fmt"
          rm -f "${active_rust_bin_dir}/rustfmt"
          rm -f ~/.cargo/bin/cargo-fmt
          rm -f ~/.cargo/bin/rustfmt

          rustup component add --toolchain ${active_rust_toolchain} rustfmt clippy
      shell: bash

    - name: Run Install
      run: mise :install
      shell: bash
