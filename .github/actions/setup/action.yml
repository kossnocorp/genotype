name: Set Up Dev Env

runs:
  using: "composite"

  steps:
    - name: Install mise and Tools
      uses: jdx/mise-action@v4

    - name: Restore mise State (Tasks)
      uses: actions/cache/restore@v5
      with:
        path: ~/.local/state/mise
        key: mise-state-${{ runner.os }}-${{ github.sha }}
        restore-keys: mise-state-${{ runner.os }}-

    - name: Restore rustup Cache
      uses: actions/cache/restore@v5
      with:
        path: ~/.rustup
        key: rustup-${{ runner.os }}-${{ hashFiles('**/rust-toolchain.toml') }}
        restore-keys: rustup-${{ runner.os }}-

    - name: Restore Cargo Cache
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          ~/.cargo/bin
          ~/.cargo/binstall
          ~/.cargo/env
          target
        key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: cargo-${{ runner.os }}-

    - name: Get pnpm Store Path
      id: pnpm-store
      run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      shell: bash

    - name: Restore pnpm Cache
      uses: actions/cache/restore@v5
      with:
        path: |
          ${{ steps.pnpm-store.outputs.STORE_PATH }}
          node_modules
        key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: pnpm-${{ runner.os }}-

    - name: Restore uv Cache
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.cache/uv
          ~/.local/share/uv
          .venv
        key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
        restore-keys: uv-${{ runner.os }}-

    - name: Run Install
      run: mise :install
      shell: bash

