name: Set Up Dev Env
description: "Set up development environment by installing dependencies and restoring caches."

inputs:
  target-key:
    required: true
    description: "Key for caching target directory."

runs:
  using: "composite"

  steps:
    - name: Install mise
      uses: jdx/mise-action@v4
      with:
        cache: false
        install: false

    - name: Restore mise Cache
      uses: actions/cache/restore@v5
      with:
        path: ~/.local/share/mise
        key: mise-${{ runner.os }}-${{ hashFiles('**/mise.toml', '**/mise.lock') }}
        restore-keys: |
          mise-${{ runner.os }}-

    - name: Restore mise State (Tasks)
      uses: actions/cache/restore@v5
      with:
        path: ~/.local/state/mise
        key: mise-state-${{ runner.os }}-${{ hashFiles('**/mise.toml') }}-${{ github.sha }}
        restore-keys: |
          mise-state-${{ runner.os }}-${{ hashFiles('**/mise.toml') }}-
          mise-state-${{ runner.os }}-

    - name: Restore rustup Cache
      uses: actions/cache/restore@v5
      with:
        path: ~/.rustup
        key: rustup-${{ runner.os }}-${{ hashFiles('**/rust-toolchain.toml') }}
        restore-keys: |
          rustup-${{ runner.os }}-

    - name: Restore Cargo Cache
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          ~/.cargo/binstall
          ~/.cargo/env
        key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          cargo-${{ runner.os }}-

    - name: Install Tools
      run: |
        mise trust --yes
        mise install
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Restore Target Cache
      uses: actions/cache/restore@v5
      with:
        path: target
        key: target-${{ runner.os }}-${{ inputs.target-key }}-${{ github.sha }}
        restore-keys: |
          target-${{ runner.os }}-${{ inputs.target-key }}-
          target-${{ runner.os }}-

    - name: Get pnpm Store Path
      id: pnpm-store
      run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      shell: bash

    - name: Restore pnpm Cache
      uses: actions/cache/restore@v5
      with:
        path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
        key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-${{ runner.os }}-

    - name: Restore uv Cache
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.cache/uv
          ~/.local/share/uv
          .venv
        key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          uv-${{ runner.os }}-

    - name: Run Install
      run: mise :install
      shell: bash
