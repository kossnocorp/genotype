name: Rust setup

defaults:
  run:
    shell: bash

runs:
  using: "composite"

  steps:
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
